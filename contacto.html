<body>
    <div id="contenedor_principal">
        <h1>Boutique</h1>
        <h2>Contacto</h2>
        <p>¿Tienes alguna consulta? Completa el formulario.</p>

        <form action="#" method="post">

            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for="correo">Correo electrónico:</label><br>
            <input type="email" id="correo" name="correo" required><br><br>

            <label for="asunto">Asunto:</label><br>
            <input type="text" id="asunto" name="asunto"><br><br>

            <label for="mensaje">Mensaje:</label><br>
            <textarea id="mensaje" name="mensaje" rows="5" cols="30" required></textarea><br><br>

            <input type="submit" value="Enviar">

        </form>

        <footer>
        <div class="footer-columna">
            <a href="Contacto.html"><h3>Contacto</h3></a>
            <a href="mailto:Boutique@gmail.com">Boutique@gmail.com</a>
            <a href="tel:2995339723">299-5339723</a>
            <span class="dato-texto">Neuquén, Neuquén</span>
        </div>

        <div class="footer-columna">
            <h3>Nuestras redes sociales</h3>
            <div class="redes-enlaces">
                <a href="#">Instagram</a>
                <a href="#">TikTok</a>
            </div>
        </div>
    </footer>
    </div>
